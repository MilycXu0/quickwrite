# Nginx reverse proxy for QuickWrite
# Place at: /etc/nginx/sites-available/quickwrite

server {
    listen 80;
    server_name your-domain.com;   # Change to your domain or IP

    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;      # Long timeout for chapter generation
        proxy_send_timeout 300s;
    }

    # Static files — serve directly
    location /static {
        alias /home/ubuntu/quickwrite/src/web/static;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
