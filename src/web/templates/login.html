{% extends "base.html" %}
{% block title %}登录 — Novel Writer Agent{% endblock %}

{% block content %}

<div style="max-width:400px;margin:4rem auto;">
    <div class="card" style="text-align:center;">
        <div style="font-size:3rem;margin-bottom:1rem;">✍️</div>
        <h2 style="margin-bottom:0.5rem;">QuickWrite</h2>
        <p style="color:var(--text-dim);margin-bottom:1.5rem;">请输入管理密码以继续</p>

        <div id="login-error" style="margin-bottom:1rem;"></div>

        <div class="form-group">
            <input type="password" id="login-password" placeholder="管理密码"
                   onkeydown="if(event.key==='Enter'){doLogin();event.preventDefault();}"
                   autofocus>
        </div>

        <button class="btn btn-primary btn-lg" onclick="doLogin()" id="login-btn" style="width:100%;">
            🔐 登录
        </button>
        <input type="hidden" id="next-url" value="{{ next }}">
    </div>
</div>

<script>
async function doLogin() {
    var btn = document.getElementById('login-btn');
    var pw = document.getElementById('login-password').value;
    var err = document.getElementById('login-error');
    var next = document.getElementById('next-url').value || '/';

    if (!pw) {
        err.innerHTML = '<div class="alert alert-error">请输入密码</div>';
        return;
    }

    btn.disabled = true;
    btn.textContent = '⏳ 验证中...';
    err.innerHTML = '';

    try {
        var resp = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({password: pw})
        });
        var data = await resp.json();
        if (data.success) {
            window.location.href = next;
        } else {
            err.innerHTML = '<div class="alert alert-error">❌ ' + data.error + '</div>';
        }
    } catch(e) {
        err.innerHTML = '<div class="alert alert-error">❌ 网络错误</div>';
    }
    btn.disabled = false;
    btn.textContent = '🔐 登录';
}
</script>
{% endblock %}
