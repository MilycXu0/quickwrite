<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Novel Writer Agent{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    {% block head %}{% endblock %}
</head>
<body>
    <nav>
        <a href="/" class="logo">✍️ NovelWriter</a>
        <div class="nav-links">
            <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">📊 控制台</a>
            <a href="/create" class="{% if request.url.path == '/create' %}active{% endif %}">🆕 创建小说</a>
            <a href="/learning" class="{% if request.url.path == '/learning' %}active{% endif %}">🧠 学习报告</a>
            <a href="/settings" class="{% if request.url.path == '/settings' %}active{% endif %}">⚙️ 设置</a>
            <a href="#" onclick="doLogout();return false;" style="color:var(--red);">🚪 登出</a>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script>
    async function doLogout() {
        try {
            await fetch('/api/auth/logout', {method: 'POST'});
        } catch(e) {}
        window.location.href = '/login';
    }
    </script>
</body>
</html>
